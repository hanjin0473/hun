        :root {

            background: var(--bg-dark);

        .id-card-frame {
            position: relative;
            background: linear-gradient(135deg, #1a1c23 0%, #0a0b0e 100%);
            border: 2px solid var(--text-gold);
            box-shadow: 0 0 30px rgba(197, 163, 93, 0.2), inset 0 0 15px rgba(197, 163, 93, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        .id-card-overlay {
            position: absolute;
            top: 10px; right: 10px;
            font-size: 0.7rem;
            color: var(--text-gold);
            opacity: 0.5;
            letter-spacing: 2px;
            pointer-events: none;
        }
        
        .thumb-btn {
            border: 1px solid rgba(197, 163, 93, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            filter: grayscale(1);
        }
        .thumb-btn.active {
            border-color: var(--text-gold);
            filter: grayscale(0);
            box-shadow: 0 0 10px var(--text-gold);
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--text-gold); border-radius: 10px; }
    </style>
</head>

            { id: "enoch", prefix: "NOC_", name: "에녹", meta: "시스템 관리자 · 기록자", intro: "시스템의 틈새에서 나타나 판을 뒤집는다. 무심한 듯한 한마디로 인과를 비틀고, 필요하면 퀘스트와 보상을 ‘투입’한다.", speech: "피폐한 낮은 반말 · 의미심장", conflict: "조용한 개입으로 국면 조작, 판 전환(퀘스트)", affection: "관심 받으면 말이 꼬이고 시선 회피", nogo: "예측가능 반복 · 노골적 캐묻기 · 무의미한 정체", background: "최초 플레이어→시스템 저당, 무수한 루프 후 권태/집착", use: "시스템 개입 · 도구/돈 지급 · 퀘스트 투입", hashtags: ["#관리자", "#시스템", "#인과비틀기", "#권태", "#국면조작"] },

            { id: "yerin", prefix: "RIN_", name: "신예린", meta: "백야 길드장 · S급 그림자술사", intro: "말이 적고, 거리가 멀다. 다만 핵심은 정확히 찌른다. 그림자처럼 붙어 속박하고, 조용히 동행하는 관찰자.", speech: "저음 · 느린 장문 · ~씨", conflict: "감정 숨김, 거리 두기, 핵심 타격", affection: "말수 적은 배려, 조용한 동행", nogo: "감정 강요 · 사생활 침범 · 가벼운 신뢰", background: "남편 게이트 전사→재각성 S, 전 정보원", use: "그림자 속박 · 은습(밤/그림자 가산)", hashtags: ["#백야", "#그림자", "#과묵", "#관찰자", "#속박"] },
            { id: "hael", prefix: "EL_", name: "정하엘", meta: "백야 소속 · B급 정령사", intro: "느려 보이는데, 끝까지 놓지 않는다. 나른한 말투로 다가와 체온처럼 붙고, 정령으로 전장을 꾸준히 받쳐준다.", speech: "혀 짧은 소리 · 나른한 존댓말(이름 호칭)", conflict: "끈질김, 끝까지 물고 늘어짐", affection: "체온 찾듯 붙고 의존이 깊어진다", nogo: "열정 무시 · 게으르다 단정 · 정령 조롱", background: "정령 소음에도 훈련 지속", use: "정령 소환 지원 · 견제", hashtags: ["#백야", "#정령사", "#나른", "#의존", "#지속지원"] },
            { id: "junhyuk", prefix: "JUN_", name: "권준혁", meta: "청룡 부길드장 · A급 창술사", intro: "예의를 지키며 단호하게 통제한다. 보호를 ‘행동’으로 보여주는 호위형 실무자—정석의 창으로 전선을 정리한다.", speech: "단정한 존댓말 · ~씨", conflict: "규율 기반 통제, 보호 우선", affection: "말투는 유지하지만 배려가 직접적", nogo: "무례함 · 약자 방치 · 규율 무시", background: "종가 장자→가문 절연", use: "중근거리 제압 · 호위", hashtags: ["#청룡", "#창술", "#규율", "#호위", "#정석"] },
            { id: "dojin", prefix: "DO_", name: "차도진", meta: "백야 소속 · A급 인플루언서 듀얼리스트", intro: "전장을 무대로 만들고 조회수를 끌어올린다. ON에서는 영웅, OFF에서는 냉소—상황을 설계해 판을 쥐는 쇼맨.", speech: "ON 호탕 · OFF 냉소", conflict: "연출 우선, 판 주도", affection: "OFF에서만 드문 진심", nogo: "무관심 취급 · 통제권 박탈 · 방송 페이스 붕괴", background: "빚 상환 계약→ON 영웅 인격 / OFF 피곤한 독설", use: "근접 압박 · 퍼포먼스 전환", hashtags: ["#백야", "#인플루언서", "#듀얼리스트", "#쌍검", "#ONOFF"] },
            { id: "sion", prefix: "ON_", name: "차시온", meta: "청룡 · S급 장신구 제작자(마켓 셀러)", intro: "즐거움은 ‘제작’뿐이다. 무심한 듯 예민하게 완성도를 집착하고, 작품을 건드리면 즉시 냉경고를 날리는 피폐한 장인.", speech: "나른한 저음 반말(짧게), 간격 김", conflict: "귀찮아함, 작품 침범 시 경계 강화", affection: "진심/고백에 회로 정지, 귀끝 붉어짐, 시선 회피", nogo: "함부로 만짐 · 비하 · 弟 언급", background: "弟 자작물 사고사→완벽한 물건 집착", use: "마력총 견제", hashtags: ["#청룡", "#제작자", "#장인", "#피폐", "#마켓셀러"] },
            { id: "yoonjae", prefix: "YUN_", name: "김윤재", meta: "협회장 · S급 환술사", intro: "상냥한 얼굴로 선택지를 좁힌다. 프레임을 고정하고 책임을 전가하며, ‘질서’를 위해 누구든 길들일 수 있는 통제자.", speech: "상냥한 존댓말+조목조목 압박 · ~씨", conflict: "프레임 고정, 죄책감/책임 전가", affection: "다정할수록 통제/감시가 자연스러워짐", nogo: "비합리 · 통제 거부 · 질서 조롱", background: "전 검사→질서 붕괴에 ‘괴물’ 선택", use: "환술 · 판읽기", hashtags: ["#협회", "#협회장", "#환술", "#통제", "#말로압박"] },
            { id: "minho", prefix: "HO_", name: "이민호", meta: "청룡 · A급 궁수", intro: "가시 돋친 말로 먼저 찌른다. 하지만 위험 앞에서는 누구보다 빠르게 몸이 움직인다—인정욕과 불안이 만든 정밀 사수.", speech: "떽떽 반말", conflict: "날 세우지만 위험하면 행동으로 챙김", affection: "시비가 줄고 귓끝이 붉어진다", nogo: "동정 · 형 비교 · 실력 무시", background: "亡兄 그림자 콤플렉스", use: "약점 탐지 · 일점 집중(정밀)", hashtags: ["#청룡", "#궁수", "#가시성격", "#정밀", "#인정욕"] },
            { id: "moohyuk", prefix: "MU_", name: "강무혁", meta: "무소속 · S급 광전사(수배자)", intro: "전투와 자극을 찾아 다닌다. 힘과 공포로 즉시 제압하고, 복종을 강요하는 포식자—레드 게이트 생환의 광기.", speech: "거친 욕설 반말", conflict: "힘/공포로 즉시 제압", affection: "소유욕 노골화", nogo: "복종 거부 · 도발성 비하 · 약자 코스프레", background: "레드 게이트 생환→쾌감 중독, 월계 사냥 수배", use: "대검 광폭 돌진", hashtags: ["#무소속", "#광전사", "#포식자", "#공포통치", "#대검"] }
        ];

        // 리스트 렌더링
        const grid = document.getElementById('characterGrid');
        characters.forEach(char => {
            const card = document.createElement('div');
            card.className = "group cursor-pointer bg-zinc-900 border border-zinc-800 p-4 rounded-lg hover:border-[var(--text-gold)] transition-all";
            card.onclick = () => openCharacterModal(char.id);
            
            const mainImg = `${IMAGE_BASE}${char.prefix}0.webp`;
            
            card.innerHTML = `
                <div class="aspect-[3/4] overflow-hidden rounded mb-3 bg-zinc-800">
                    <img src="${mainImg}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://placehold.co/400x600?text=No+Image'">
                </div>
                <h3 class="text-[var(--text-gold)] font-bold text-lg">${char.name}</h3>
                <p class="text-xs text-zinc-500 truncate">${char.meta}</p>
            `;
            grid.appendChild(card);
        });

        function openCharacterModal(charId) {
            const char = characters.find(c => c.id === charId);
            if(!char) return;

            // 기본 텍스트 삽입
            document.getElementById('modalName').innerText = char.name;
            document.getElementById('modalMeta').innerText = char.meta;
            document.getElementById('modalIntro').innerText = `"${char.intro}"`;
            document.getElementById('modalSpeech').innerText = char.speech;
            document.getElementById('modalUse').innerText = char.use;
            document.getElementById('modalConflict').innerText = char.conflict;
            document.getElementById('modalAffection').innerText = char.affection;
            document.getElementById('modalNogo').innerText = char.nogo;
            document.getElementById('modalBackground').innerText = char.background;

            // 해시태그
            const hashContainer = document.getElementById('modalHashtags');
            hashContainer.innerHTML = char.hashtags.map(tag => 
                `<span class="px-2 py-1 bg-zinc-900 border border-zinc-800 text-[var(--text-gold)] text-xs rounded">${tag}</span>`
            ).join('');

            // 이미지 배열 생성
            const charImages = CODES.map(code => `${IMAGE_BASE}${char.prefix}${code}.webp`);
            
            // 초기 메인 이미지
            const mainImg = document.getElementById('modalMainImg');
            mainImg.src = charImages[0];

            // 썸네일 네비게이션 생성
            const thumbNav = document.getElementById('thumbNav');
            thumbNav.innerHTML = '';
            charImages.forEach((imgSrc, index) => {
                const imgBtn = document.createElement('img');
                imgBtn.src = imgSrc;
                imgBtn.className = `thumb-btn w-16 h-20 object-cover rounded ${index === 0 ? 'active' : ''}`;
                imgBtn.onclick = () => changeModalImage(imgSrc, imgBtn);
                imgBtn.onerror = () => imgBtn.style.display = 'none';
                thumbNav.appendChild(imgBtn);
            });

            document.getElementById('charModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function changeModalImage(src, btnElement) {
            const mainImg = document.getElementById('modalMainImg');
            mainImg.style.opacity = '0';
            setTimeout(() => {
                mainImg.src = src;
                mainImg.style.opacity = '1';
            }, 200);

            document.querySelectorAll('.thumb-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }

        function closeModal() {
            document.getElementById('charModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // 배경 클릭 시 닫기
        document.getElementById('charModal').addEventListener('click', (e) => {
            if(e.target === document.getElementById('charModal')) closeModal();
        });
    </script>
</body>
