        const grid = document.getElementById('characterGrid');

        function init() {
            characters.forEach((char, index) => {
                const card = document.createElement('div');
                card.className = "sys-card p-4 cursor-pointer group rounded-lg";
                card.onclick = () => openModal(index);
                card.innerHTML = `
                    <div class="overflow-hidden rounded mb-4">
                        <img src="${char.images[0]}" class="w-full aspect-[3/4] object-cover group-hover:scale-105 transition-transform duration-500">
                    </div>
                    <div>
                        <span class="orbitron text-[10px] font-bold text-blue-600">${char.rank}</span>
                        <h3 class="text-xl font-bold text-slate-800">${char.name}</h3>
                        <p class="text-xs text-slate-400 font-medium truncate">${char.hashtags.join(' ')}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(index) {
            const char = characters[index];
            document.getElementById('modalName').innerText = char.name;
            document.getElementById('modalRank').innerText = char.rank;
            document.getElementById('modalFaction').innerText = char.faction;
            document.getElementById('modalQuote').innerText = `"${char.quote}"`;
            document.getElementById('modalJob').innerText = char.job;
            document.getElementById('modalWeapon').innerText = char.weapon;
            document.getElementById('modalPhysical').innerText = `${char.height} / ${char.weight}`;
            document.getElementById('modalSkillSum').innerText = char.skills.join(', ');
            document.getElementById('modalLikes').innerText = char.likes;
            document.getElementById('modalDislikes').innerText = char.dislikes;
            document.getElementById('modalHistory').innerHTML = char.history;
            document.getElementById('modalIdCode').innerText = char.idCode;

            // 해시태그 생성
            const hashContainer = document.getElementById('modalHashtags');
            hashContainer.innerHTML = char.hashtags.map(h => 
                `<span class="text-xs font-bold text-blue-500 bg-blue-50 px-2 py-1 rounded">${h}</span>`
            ).join('');

            // 이미지 처리
            const mainImg = document.getElementById('modalMainImg');
            mainImg.src = char.images[0];

            const thumbNav = document.getElementById('thumbNav');
            thumbNav.innerHTML = '';
            char.images.forEach((imgSrc, i) => {
                const thumb = document.createElement('img');
                thumb.src = imgSrc;
                thumb.className = `w-12 h-16 object-cover cursor-pointer rounded border-2 ${i === 0 ? 'border-blue-500' : 'border-transparent'}`;
                thumb.onclick = () => {
                    mainImg.src = imgSrc;
                    document.querySelectorAll('#thumbNav img').forEach(img => img.classList.replace('border-blue-500', 'border-transparent'));
                    thumb.classList.replace('border-transparent', 'border-blue-500');
                };
                thumbNav.appendChild(thumb);
            });

            document.getElementById('charModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('charModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        init();
    </script>
